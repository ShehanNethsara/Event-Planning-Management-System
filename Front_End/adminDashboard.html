<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel | EventPro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

<div class="d-flex">
  <nav class="sidebar bg-primary text-white p-4 vh-100 position-fixed" style="width: 260px;">
    <div class="mb-5">
      <h3 class="fw-bold">Event<span class="text-warning">Pro</span></h3>
      <small class="text-white-50">Admin Dashboard</small>
    </div>
    <ul class="nav flex-column gap-2">
      <li class="nav-item">
        <a href="adminDashboard.html" class="nav-link text-white active-link bg-white bg-opacity-10 rounded">
          <i class="fas fa-th-large me-2"></i> Overview
        </a>
      </li>
      <li class="nav-item">
        <a href="admin_analytics.html" class="nav-link text-white">
          <i class="fas fa-chart-pie me-2"></i> Analytics
        </a>
      </li>
      <li class="nav-item">
        <a href="manage_vendors.html" class="nav-link text-white">
          <i class="fas fa-store me-2"></i> Manage Vendors
        </a>
      </li>
      <li class="nav-item mt-5">
        <button onclick="logout()" class="btn btn-outline-light w-100 border-0 text-start">
          <i class="fas fa-sign-out-alt me-2"></i> Logout
        </button>
      </li>
    </ul>
  </nav>

  <main class="flex-grow-1 p-5" style="margin-left: 260px;">
    <header class="d-flex justify-content-between align-items-center mb-5">
      <div>
        <h2 class="fw-bold text-dark">Control Panel</h2>
        <p class="text-muted">Welcome back, Admin. Manage system requests here.</p>
      </div>
      <div class="d-flex align-items-center gap-3 bg-white p-2 rounded-pill shadow-sm">
        <span class="ps-3 fw-semibold text-primary" id="adminName">Admin User</span>
        <img src="https://ui-avatars.com/api/?name=Admin&background=0D6EFD&color=fff" class="rounded-circle" width="40" alt="Admin">
      </div>
    </header>

    <div class="row g-4 mb-5">
      <div class="col-md-4">
        <div class="card border-0 shadow-sm p-3 rounded-4">
          <div class="d-flex align-items-center gap-3">
            <div class="p-3 bg-primary bg-opacity-10 rounded-3">
              <i class="fas fa-calendar-check text-primary fs-3"></i>
            </div>
            <div>
              <h4 class="mb-0 fw-bold" id="totalEvents">24</h4>
              <small class="text-muted">Total Events</small>
            </div>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card border-0 shadow-sm p-3 rounded-4">
          <div class="d-flex align-items-center gap-3">
            <div class="p-3 bg-success bg-opacity-10 rounded-3">
              <i class="fas fa-user-tie text-success fs-3"></i>
            </div>
            <div>
              <h4 class="mb-0 fw-bold" id="totalVendors">12</h4>
              <small class="text-muted">Active Vendors</small>
            </div>
          </div>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card border-0 shadow-sm p-3 rounded-4">
          <div class="d-flex align-items-center gap-3">
            <div class="p-3 bg-warning bg-opacity-10 rounded-3">
              <i class="fas fa-clock text-warning fs-3"></i>
            </div>
            <div>
              <h4 class="mb-0 fw-bold" id="pendingRequests">08</h4>
              <small class="text-muted">Pending Requests</small>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
      <div class="card-header bg-white p-4 border-0 d-flex justify-content-between align-items-center">
        <h5 class="fw-bold mb-0">Manage All Requests</h5>
        <button class="btn btn-primary btn-sm rounded-pill px-3" onclick="loadRequests()">Refresh Data</button>
      </div>
      <div class="table-responsive px-4 pb-4">
        <table class="table align-middle">
          <thead class="text-muted small text-uppercase">
          <tr>
            <th>Client Name</th>
            <th>Event Type</th>
            <th>Planned Date</th>
            <th>Status</th>
            <th class="text-center">Action</th>
          </tr>
          </thead>
          <tbody id="adminTableBody">
          </tbody>
        </table>
      </div>
    </div>
  </main>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/admin.js"></script>
<script>
  // Security Check: Admin ද කියලා බලමු
  if (localStorage.getItem('userRole') !== 'ADMIN') {
    window.location.href = 'login.html';
  }

  function logout() {
    localStorage.clear();
    window.location.href = 'login.html';
  }
</script>
</body>
</html>
