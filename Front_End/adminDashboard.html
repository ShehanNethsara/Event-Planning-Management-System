<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Dashboard | EventPro Intelligence</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --bg-deep: #0a0f1c;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --neon-blue: #3b82f6;
      --neon-purple: #8b5cf6;
      --text-main: #ffffff; /* පැහැදිලි සුදු අකුරු */
      --text-dim: #94a3b8;  /* ලාවට පේන අකුරු පවා මම වැඩි කළා */
    }

    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background-color: var(--bg-deep);
      background-image:
              radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.15) 0px, transparent 50%),
              radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.1) 0px, transparent 50%);
      color: var(--text-main);
      margin: 0;
      min-height: 100vh;
    }

    /* --- Modern Sidebar with Blur --- */
    .sidebar {
      width: 280px;
      background: rgba(10, 15, 28, 0.8);
      backdrop-filter: blur(20px);
      border-right: 1px solid var(--glass-border);
      position: fixed;
      height: 100vh;
      padding: 30px 20px;
      transition: 0.3s;
    }

    .brand-logo {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(to right, #3b82f6, #8b5cf6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 50px;
      padding-left: 15px;
      text-decoration: none;
      display: block;
    }

    .nav-link {
      color: var(--text-dim) !important;
      padding: 14px 18px !important;
      border-radius: 12px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      font-weight: 500;
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .nav-link i { margin-right: 15px; font-size: 1.2rem; }

    .nav-link:hover, .active-link {
      background: rgba(59, 130, 246, 0.1);
      color: var(--neon-blue) !important;
      transform: translateX(5px);
    }

    .active-link {
      background: rgba(59, 130, 246, 0.15) !important;
      border: 1px solid rgba(59, 130, 246, 0.2);
    }

    /* --- Main Content Area --- */
    .main-content {
      margin-left: 280px;
      padding: 40px 60px;
    }

    /* --- Glass Stat Cards --- */
    .stat-card {
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      padding: 30px;
      transition: 0.3s;
    }

    .stat-card:hover {
      border-color: rgba(59, 130, 246, 0.4);
      background: rgba(255, 255, 255, 0.05);
    }

    .stat-label { color: var(--text-dim); font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
    .stat-value { font-size: 2.2rem; font-weight: 800; margin-top: 10px; color: #fff; }

    /* --- Tables (The most unique part) --- */
    .table-glass {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 24px;
      overflow: hidden;
      margin-top: 30px;
    }

    .table { color: #fff; margin-bottom: 0; }
    .table thead { background: rgba(255,255,255,0.02); }
    .table th {
      color: var(--neon-blue);
      text-transform: uppercase;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 22px;
      border-bottom: 1px solid var(--glass-border);
    }
    .table td {
      padding: 22px;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      vertical-align: middle;
      color: #e2e8f0; /* පැහැදිලි ලා අළු පාට */
    }

    .badge-modern {
      padding: 8px 16px;
      border-radius: 100px;
      font-size: 0.75rem;
      font-weight: 700;
    }

    .status-pending { background: rgba(245, 158, 11, 0.1); color: #f59e0b; border: 1px solid rgba(245, 158, 11, 0.2); }
    .status-success { background: rgba(16, 185, 129, 0.1); color: #10b981; border: 1px solid rgba(16, 185, 129, 0.2); }

    .btn-sync {
      background: linear-gradient(to right, #3b82f6, #2563eb);
      color: white;
      border: none;
      padding: 10px 24px;
      border-radius: 12px;
      font-weight: 700;
      transition: 0.3s;
    }

    .btn-sync:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(59, 130, 246, 0.4); }

    /* Hide sections */
    .content-section { display: none; }
    .content-section.active { display: block; animation: fadeIn 0.5s ease; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    @media (max-width: 992px) {
      .sidebar { width: 80px; }
      .sidebar span, .brand-logo span { display: none; }
      .main-content { margin-left: 80px; padding: 30px; }
    }
  </style>
</head>
<body>

<aside class="sidebar">
  <a href="#" class="brand-logo">Event<span>Pro.</span></a>
  <nav class="nav flex-column">
    <a href="#" class="nav-link active-link" onclick="toggleSection('sectionEvents', this)">
      <i class="fas fa-grid-2"></i> <span>Overview</span>
    </a>
    <a href="admin_analytics.html" class="nav-link">
      <i class="fas fa-chart-line"></i> <span>Intelligence</span>
    </a>
    <a href="manage_vendors.html" class="nav-link">
      <i class="fas fa-truck-fast"></i> <span>Vendors</span>
    </a>
    <a href="#" class="nav-link" onclick="toggleSection('sectionClients', this)">
      <i class="fas fa-user-group"></i> <span>Clients</span>
    </a>
    <a href="#" class="nav-link" onclick="toggleSection('sectionPayments', this)">
      <i class="fas fa-wallet"></i> <span>Finance</span>
    </a>
    <a href="#" class="nav-link" onclick="toggleSection('sectionInvoices', this)">
      <i class="fas fa-file-invoice"></i> <span>Reports</span>
    </a>
    <div style="position: absolute; bottom: 40px; width: calc(100% - 40px);">
      <hr class="opacity-10">
      <a href="#" onclick="logout()" class="nav-link text-danger">
        <i class="fas fa-power-off"></i> <span>Sign Out</span>
      </a>
    </div>
  </nav>
</aside>

<main class="main-content">
  <header class="d-flex justify-content-between align-items-center mb-5">
    <div>
      <h1 class="fw-800 m-0">Admin Center</h1>
      <p class="text-dim m-0" id="currentDay">Wednesday, April 22, 2026</p>
    </div>
    <div class="d-flex align-items-center gap-3">
      <button class="btn btn-sync" onclick="loadAllRequests()">
        <i class="fas fa-rotate me-2"></i> Sync Data
      </button>
      <img src="https://ui-avatars.com/api/?name=Admin&background=3b82f6&color=fff" class="rounded-circle border border-2 border-primary" width="45">
    </div>
  </header>

  <div class="row g-4 mb-5">
    <div class="col-md-4">
      <div class="stat-card">
        <div class="stat-label">Total Requests</div>
        <div class="stat-value" id="totalEvents">0</div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="stat-card">
        <div class="stat-label">Pending Action</div>
        <div class="stat-value text-warning" id="pendingRequests">0</div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="stat-card">
        <div class="stat-label">Revenue Growth</div>
        <div class="stat-value" id="statTotalRevenue">0.00</div>
      </div>
    </div>
  </div>

  <div id="sectionEvents" class="content-section active">
    <h4 class="fw-bold mb-4">Real-time Operations</h4>
    <div class="table-glass shadow-lg">
      <table class="table">
        <thead>
        <tr>
          <th>Client Detail</th>
          <th>Category</th>
          <th>Planned Date</th>
          <th>Current Status</th>
          <th class="text-center">Control</th>
        </tr>
        </thead>
        <tbody id="adminTableBody">
        </tbody>
      </table>
    </div>
  </div>

  <div id="sectionClients" class="content-section">
    <h4 class="fw-bold mb-4">Customer Directory</h4>
    <div class="table-glass"><table class="table"><tbody id="clientTableBody"></tbody></table></div>
  </div>

  <div id="sectionPayments" class="content-section">
    <h4 class="fw-bold mb-4 text-primary">Financial Ledger</h4>
    <div class="table-glass"><table class="table"><tbody id="paymentTableBody"></tbody></table></div>
  </div>

</main>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/admin.js"></script>
<script>
  // UI Logic: Section Toggler
  function toggleSection(sectionId, element) {
    $('.content-section').removeClass('active');
    $('.nav-link').removeClass('active-link');
    $('#' + sectionId).addClass('active');
    $(element).addClass('active-link');
  }

  if (localStorage.getItem('userRole') !== 'ADMIN') { window.location.href = 'login.html'; }
</script>
</body>
</html>
