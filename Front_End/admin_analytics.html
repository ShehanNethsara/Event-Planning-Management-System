<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Analytics | EventPro Admin</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

<div class="d-flex">
    <nav class="sidebar bg-primary text-white p-4 vh-100 position-fixed" style="width: 260px;">
        <div class="mb-5">
            <h3 class="fw-bold">Event<span class="text-warning">Pro</span></h3>
        </div>
        <ul class="nav flex-column gap-2">
            <li class="nav-item"><a href="adminDashboard.html" class="nav-link text-white-50"><i class="fas fa-th-large me-2"></i> Overview</a></li>
            <li class="nav-item"><a href="admin_analytics.html" class="nav-link text-white active-link bg-white bg-opacity-10 rounded"><i class="fas fa-chart-pie me-2"></i> Analytics</a></li>
            <li class="nav-item"><a href="manage_vendors.html" class="nav-link text-white-50"><i class="fas fa-store me-2"></i> Manage Vendors</a></li>
        </ul>
    </nav>

    <main class="flex-grow-1 p-5" style="margin-left: 260px;">
        <h2 class="fw-bold mb-4">System Analytics</h2>

        <div class="row g-4">
            <div class="col-md-8">
                <div class="card border-0 shadow-sm rounded-4 p-4">
                    <h5 class="fw-bold mb-4">Booking Trends</h5>
                    <canvas id="bookingChart"></canvas>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card border-0 shadow-sm rounded-4 p-4">
                    <h5 class="fw-bold mb-4">Event Types</h5>
                    <canvas id="eventPieChart"></canvas>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    // --- 1. Line Chart Logic ---
    const lineCtx = document.getElementById('bookingChart').getContext('2d');
    new Chart(lineCtx, {
        type: 'line',
        data: {
            labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May'],
            datasets: [{
                label: 'Bookings',
                data: [12, 19, 10, 15, 25],
                borderColor: '#0d6efd',
                tension: 0.4,
                fill: true,
                backgroundColor: 'rgba(13, 110, 253, 0.1)'
            }]
        }
    });

    // --- 2. Pie Chart Logic ---
    const pieCtx = document.getElementById('eventPieChart').getContext('2d');
    new Chart(pieCtx, {
        type: 'doughnut',
        data: {
            labels: ['Wedding', 'Birthday', 'Corporate'],
            datasets: [{
                data: [50, 30, 20],
                backgroundColor: ['#0d6efd', '#198754', '#ffc107']
            }]
        }
    });
</script>
</body>
</html>
