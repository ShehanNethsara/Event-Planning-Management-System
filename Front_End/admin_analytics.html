<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analytics | EventPro Admin Intelligence</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        :root {
            --bg-dark: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --neon-blue: #6366f1;
            --neon-purple: #a855f7;
            --neon-pink: #ec4899;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            margin: 0;
            overflow-x: hidden;
        }

        /* --- Modern Sidebar --- */
        .sidebar {
            width: 280px;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(20px);
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            z-index: 1000;
        }

        .brand-logo {
            font-weight: 800;
            font-size: 1.5rem;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 40px;
            display: block;
            text-decoration: none;
        }

        .nav-link {
            color: var(--text-muted) !important;
            padding: 12px 20px !important;
            border-radius: 12px;
            margin-bottom: 8px;
            transition: 0.3s;
            display: flex;
            align-items: center;
        }

        .nav-link i { margin-right: 12px; font-size: 1.1rem; }

        .nav-link:hover, .active-link {
            background: rgba(99, 102, 241, 0.1);
            color: white !important;
            box-shadow: inset 0 0 10px rgba(99, 102, 241, 0.1);
        }

        .active-link {
            border-left: 4px solid var(--neon-blue);
        }

        /* --- Main Content --- */
        .main-content {
            margin-left: 280px;
            padding: 50px;
            min-height: 100vh;
            background: radial-gradient(circle at top right, rgba(99, 102, 241, 0.05), transparent);
        }

        .page-title { font-weight: 800; font-size: 2rem; margin-bottom: 5px; }
        .page-subtitle { color: var(--text-muted); margin-bottom: 40px; }

        /* --- Analytic Cards --- */
        .stat-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            padding: 30px;
            height: 100%;
            transition: 0.3s;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(99, 102, 241, 0.3);
        }

        .chart-container { position: relative; margin-top: 20px; }

        .btn-export {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            color: white;
            padding: 8px 20px;
            border-radius: 10px;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .btn-export:hover { background: var(--neon-blue); border-color: var(--neon-blue); }

        @media (max-width: 992px) {
            .sidebar { width: 80px; padding: 20px 10px !important; }
            .sidebar span, .brand-logo span { display: none; }
            .main-content { margin-left: 80px; padding: 30px; }
        }
    </style>
</head>
<body>

<div class="d-flex">
    <nav class="sidebar vh-100 position-fixed p-4">
        <a href="#" class="brand-logo">Event<span>Pro.</span></a>

        <div class="nav flex-column">
            <a href="adminDashboard.html" class="nav-link">
                <i class="fas fa-th-large"></i> <span>Overview</span>
            </a>
            <a href="admin_analytics.html" class="nav-link active-link">
                <i class="fas fa-chart-pie"></i> <span>Analytics</span>
            </a>
            <a href="manage_vendors.html" class="nav-link">
                <i class="fas fa-store"></i> <span>Vendors</span>
            </a>
            <a href="#" class="nav-link">
                <i class="fas fa-users"></i> <span>Clients</span>
            </a>
            <hr class="my-4" style="opacity: 0.1;">
            <a href="#" onclick="logout()" class="nav-link text-danger">
                <i class="fas fa-sign-out-alt"></i> <span>Logout</span>
            </a>
        </div>
    </nav>

    <main class="main-content flex-grow-1">
        <div class="d-flex justify-content-between align-items-end mb-2">
            <div>
                <h2 class="page-title">System Intelligence</h2>
                <p class="page-subtitle">Real-time insights and performance metrics.</p>
            </div>
            <button class="btn btn-export mb-4"><i class="fas fa-download me-2"></i> Export Report</button>
        </div>

        <div class="row g-4">
            <div class="col-lg-8">
                <div class="stat-card">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 class="fw-bold m-0">Booking Growth</h5>
                        <select class="form-select form-select-sm bg-dark border-0 text-white w-auto" style="cursor: pointer;">
                            <option>Last 6 Months</option>
                            <option>Last Year</option>
                        </select>
                    </div>
                    <div class="chart-container">
                        <canvas id="bookingChart" height="280"></canvas>
                    </div>
                </div>
            </div>

            <div class="col-lg-4">
                <div class="stat-card">
                    <h5 class="fw-bold mb-4">Event Distribution</h5>
                    <div class="chart-container">
                        <canvas id="eventPieChart" height="300"></canvas>
                    </div>
                    <div class="mt-4 pt-2">
                        <div class="d-flex justify-content-between small mb-1">
                            <span>Weddings</span> <span class="fw-bold text-primary">50%</span>
                        </div>
                        <div class="progress mb-3" style="height: 4px; background: rgba(255,255,255,0.05);">
                            <div class="progress-bar bg-primary" style="width: 50%"></div>
                        </div>
                        <div class="d-flex justify-content-between small mb-1">
                            <span>Corporate</span> <span class="fw-bold text-warning">30%</span>
                        </div>
                        <div class="progress" style="height: 4px; background: rgba(255,255,255,0.05);">
                            <div class="progress-bar bg-warning" style="width: 30%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-md-4">
                <div class="stat-card text-center">
                    <p class="text-muted small mb-1">Conversion Rate</p>
                    <h2 class="fw-bold m-0 text-gradient" style="background: linear-gradient(to right, #4facfe, #00f2fe); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">64.2%</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card text-center">
                    <p class="text-muted small mb-1">Avg. Response Time</p>
                    <h2 class="fw-bold m-0 text-gradient" style="background: linear-gradient(to right, #a855f7, #ec4899); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">1.4 hrs</h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="stat-card text-center">
                    <p class="text-muted small mb-1">Customer Satisfaction</p>
                    <h2 class="fw-bold m-0 text-gradient" style="background: linear-gradient(to right, #10b981, #34d399); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">4.9/5</h2>
                </div>
            </div>
        </div>
    </main>
</div>

<script>
    // --- Chart Styling Defaults ---
    Chart.defaults.color = '#94a3b8';
    Chart.defaults.font.family = 'Plus Jakarta Sans';

    // --- 1. Line Chart Logic ---
    const lineCtx = document.getElementById('bookingChart').getContext('2d');
    const blueGrad = lineCtx.createLinearGradient(0, 0, 0, 400);
    blueGrad.addColorStop(0, 'rgba(99, 102, 241, 0.3)');
    blueGrad.addColorStop(1, 'rgba(99, 102, 241, 0)');

    new Chart(lineCtx, {
        type: 'line',
        data: {
            labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun'],
            datasets: [{
                label: 'Total Bookings',
                data: [15, 28, 22, 35, 30, 45],
                borderColor: '#6366f1',
                borderWidth: 4,
                pointBackgroundColor: '#6366f1',
                pointHoverRadius: 7,
                tension: 0.4,
                fill: true,
                backgroundColor: blueGrad
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            plugins: { legend: { display: false } },
            scales: {
                y: { grid: { color: 'rgba(255,255,255,0.05)' }, border: { display: false } },
                x: { grid: { display: false } }
            }
        }
    });

    // --- 2. Doughnut Chart Logic ---
    const pieCtx = document.getElementById('eventPieChart').getContext('2d');
    new Chart(pieCtx, {
        type: 'doughnut',
        data: {
            labels: ['Wedding', 'Birthday', 'Corporate', 'Concert'],
            datasets: [{
                data: [50, 20, 20, 10],
                backgroundColor: ['#6366f1', '#a855f7', '#ffc107', '#ec4899'],
                borderWidth: 0,
                hoverOffset: 15
            }]
        },
        options: {
            responsive: true,
            maintainAspectRatio: false,
            cutout: '80%',
            plugins: {
                legend: { position: 'bottom', labels: { usePointStyle: true, padding: 20 } }
            }
        }
    });

    function logout() {
        localStorage.clear();
        window.location.href = 'login.html';
    }
</script>
</body>
</html>
