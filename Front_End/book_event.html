<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book Event | EventPro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

<div class="d-flex">
    <nav class="sidebar bg-dark text-white p-4 vh-100 position-fixed" style="width: 260px;">
        <div class="mb-5 text-center">
            <h3 class="fw-bold text-primary">EVENT<span class="text-white">PRO</span></h3>
            <small class="text-muted">Customer Portal</small>
        </div>
        <ul class="nav flex-column gap-2">
            <li class="nav-item">
                <a href="user_dashboard.html" class="nav-link text-white-50 hover-link">
                    <i class="fas fa-home me-2"></i> Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a href="book_event.html" class="nav-link text-white active-link bg-primary rounded shadow-sm">
                    <i class="fas fa-plus-circle me-2"></i> Book New Event
                </a>
            </li>
            <li class="nav-item">
                <a href="my_reports.html" class="nav-link text-white-50 hover-link">
                    <i class="fas fa-file-invoice-dollar me-2"></i> My Invoices
                </a>
            </li>
            <li class="nav-item mt-5 pt-5">
                <hr class="text-muted">
                <button onclick="logout()" class="btn btn-outline-danger w-100 border-0 text-start">
                    <i class="fas fa-sign-out-alt me-2"></i> Logout
                </button>
            </li>
        </ul>
    </nav>

    <main class="flex-grow-1 p-5" style="margin-left: 260px;">
        <header class="mb-5">
            <h2 class="fw-bold text-dark">Reserve Your Event</h2>
            <p class="text-muted">Fill out the details below to request a new event booking.</p>
        </header>

        <div class="card border-0 shadow-sm rounded-4 p-4 p-md-5 bg-white">
            <form id="bookEventForm">
                <div class="row g-4">
                    <div class="col-md-12">
                        <label for="eventTitle" class="form-label fw-semibold">Event Title / Name</label>
                        <div class="input-group">
                            <span class="input-group-text bg-light border-0"><i class="fas fa-pen text-primary"></i></span>
                            <input type="text" id="eventTitle" class="form-control bg-light border-0 p-3" placeholder="e.g. Wedding Ceremony - Shehan & Shavindi" required>
                        </div>
                    </div>

                    <div class="col-md-6">
                        <label for="eventType" class="form-label fw-semibold">Event Type</label>
                        <select id="eventType" class="form-select bg-light border-0 p-3" required>
                            <option value="" selected disabled>Select Type</option>
                            <option value="WEDDING">Wedding</option>
                            <option value="BIRTHDAY">Birthday Party</option>
                            <option value="CORPORATE">Corporate Meeting</option>
                            <option value="CONCERT">Musical Concert</option>
                            <option value="OTHER">Other Event</option>
                        </select>
                    </div>

                    <div class="col-md-6">
                        <label for="eventDate" class="form-label fw-semibold">Planned Date</label>
                        <input type="date" id="eventDate" class="form-control bg-light border-0 p-3" required>
                    </div>

                    <div class="col-md-12">
                        <label for="eventDesc" class="form-label fw-semibold">Special Requirements</label>
                        <textarea id="eventDesc" class="form-control bg-light border-0 p-3" rows="4" placeholder="Mention any specific details, guest count, or themes..."></textarea>
                    </div>

                    <div class="col-md-12 mt-5">
                        <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill shadow p-3 fw-bold">
                            <i class="fas fa-paper-plane me-2"></i>Submit Booking Request
                        </button>
                        <p class="text-center mt-3 text-muted small">Our admin team will review and approve your request within 24 hours.</p>
                    </div>
                </div>
            </form>
        </div>
    </main>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/book_event.js"></script>
<script>
    // Simple Logout Function
    function logout() {
        localStorage.clear();
        window.location.href = 'login.html';
    }
</script>
</body>
</html>
