<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Client Dashboard - EventPro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
<nav class="navbar navbar-dark bg-dark">
    <div class="container">
        <span class="navbar-brand fw-bold">EventPro | Client</span>
        <button onclick="logout()" class="btn btn-outline-danger btn-sm">Logout</button>
    </div>
</nav>
<div class="container mt-4">
    <div class="row">
        <div class="col-md-4">
            <div class="card p-3 mb-4">
                <h5>Book New Event</h5>
                <form id="eventForm">
                    <input type="text" id="eventTitle" class="form-control mb-2" placeholder="Event Title" required>
                    <input type="date" id="eventDate" class="form-control mb-2" required>
                    <select id="eventType" class="form-select mb-2">
                        <option value="Wedding">Wedding</option>
                        <option value="Corporate">Corporate</option>
                    </select>
                    <button type="submit" class="btn btn-success w-100">Submit</button>
                </form>
            </div>
        </div>
        <div class="col-md-8">
            <div class="card p-3">
                <h5>My Bookings</h5>
                <table class="table table-striped mt-2">
                    <thead><tr><th>Title</th><th>Date</th><th>Status</th></tr></thead>
                    <tbody id="eventTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
