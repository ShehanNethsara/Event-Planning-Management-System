<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - EventPro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        .sidebar-card { border-radius: 15px; border: none; }
        .table-card { border-radius: 15px; border: none; }
        .navbar-brand { font-size: 1.5rem; letter-spacing: 1px; }
    </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark shadow-sm">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">EVENTPRO</a>
        <div class="d-flex align-items-center">
            <span id="userDisplayName" class="navbar-text me-3 text-white fw-bold"></span>
            <button onclick="logout()" class="btn btn-sm btn-outline-danger">
                <i class="bi bi-box-arrow-right"></i> Logout
            </button>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row">
        <div class="col-md-3">
            <div class="card sidebar-card shadow-sm mb-4">
                <div class="card-body">
                    <h5 class="card-title fw-bold text-secondary">Quick Stats</h5>
                    <hr>
                    <div class="d-flex justify-content-between mb-2">
                        <span>Total Events:</span>
                        <span class="fw-bold text-primary" id="totalEvents">0</span>
                    </div>
                    <div class="d-flex justify-content-between">
                        <span>Pending:</span>
                        <span class="badge bg-warning text-dark" id="pendingCount">0</span>
                    </div>
                </div>
            </div>

            <button class="btn btn-primary w-100 mb-3 shadow-sm py-2" data-bs-toggle="modal" data-bs-target="#addEventModal">
                <i class="bi bi-plus-circle me-2"></i> Book New Event
            </button>
        </div>

        <div class="col-md-9">
            <div class="card table-card shadow-sm">
                <div class="card-header bg-white py-3">
                    <h4 class="mb-0 fw-bold"><i class="bi bi-calendar-event me-2"></i>My Scheduled Events</h4>
                </div>
                <div class="card-body">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light">
                            <tr>
                                <th>Title</th>
                                <th>Date</th>
                                <th>Type</th>
                                <th>Status</th>
                                <th class="text-center">Action</th>
                            </tr>
                            </thead>
                            <tbody id="eventTableBody">
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="addEventModal" tabindex="-1" aria-labelledby="addEventModalLabel" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 shadow">
            <div class="modal-header bg-primary text-white">
                <h5 class="modal-title" id="addEventModalLabel">Event Booking Form</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <form id="eventForm">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Event Title</label>
                        <input type="text" id="eventTitle" class="form-control" placeholder="Ex: Wedding Reception" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Event Type</label>
                            <select id="eventType" class="form-select">
                                <option value="Wedding">Wedding</option>
                                <option value="Concert">Concert</option>
                                <option value="Corporate">Corporate</option>
                                <option value="Private">Private Party</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Date</label>
                            <input type="date" id="eventDate" class="form-control" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Description</label>
                        <textarea id="eventDescription" class="form-control" rows="3" placeholder="Additional details..."></textarea>
                    </div>
                    <div class="text-end">
                        <button type="button" class="btn btn-secondary me-2" data-bs-dismiss="modal">Cancel</button>
                        <button type="submit" class="btn btn-primary px-4">Submit Booking</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
