<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Intelligence | EventPro</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --bg-deep: #0a0f1c;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --neon-blue: #3b82f6;
            --neon-purple: #8b5cf6;
            --text-main: #ffffff;
            --text-dim: #94a3b8;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-deep);
            background-image:
                    radial-gradient(at 0% 0%, rgba(59, 130, 246, 0.1) 0px, transparent 50%),
                    radial-gradient(at 100% 100%, rgba(139, 92, 246, 0.05) 0px, transparent 50%);
            color: var(--text-main);
            margin: 0;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* --- Modern Sidebar with Blur --- */
        .sidebar {
            width: 280px;
            background: rgba(10, 15, 28, 0.8);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-right: 1px solid var(--glass-border);
            position: fixed;
            height: 100vh;
            padding: 35px 20px;
            z-index: 1000;
        }

        .brand-logo {
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(to right, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 50px;
            display: block;
            text-decoration: none;
            padding-left: 15px;
        }

        .nav-link {
            color: var(--text-dim) !important;
            padding: 14px 18px !important;
            border-radius: 14px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            font-weight: 500;
            transition: 0.3s;
        }

        .nav-link i { margin-right: 15px; font-size: 1.2rem; }

        .nav-link:hover, .active-link {
            background: rgba(59, 130, 246, 0.1);
            color: var(--neon-blue) !important;
            transform: translateX(5px);
        }

        .active-link {
            background: rgba(59, 130, 246, 0.15) !important;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }

        /* --- Main Content --- */
        .main-content {
            margin-left: 280px;
            padding: 50px 70px;
        }

        .page-header h2 { font-weight: 800; font-size: 2.3rem; margin-bottom: 5px; letter-spacing: -1px; }
        .page-header p { color: var(--text-dim); }

        /* --- Glass Cards & Table --- */
        .glass-container {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            padding: 30px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            margin-top: 30px;
        }

        .table { color: #fff; margin-bottom: 0; }
        .table thead { background: rgba(255,255,255,0.02); }
        .table th {
            border: none;
            padding: 20px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--neon-blue);
            font-weight: 700;
        }
        .table td {
            padding: 22px;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            vertical-align: middle;
            color: #e2e8f0;
        }

        /* --- Modern Action Buttons --- */
        .btn-action {
            padding: 8px 20px;
            border-radius: 12px;
            font-weight: 700;
            font-size: 0.85rem;
            transition: 0.3s;
            border: none;
        }

        .btn-accept { background: #10b981; color: white; }
        .btn-accept:hover { transform: scale(1.05); box-shadow: 0 0 20px rgba(16, 185, 129, 0.3); }

        .btn-reject { background: rgba(239, 68, 68, 0.1); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.2); margin-left: 8px; }
        .btn-reject:hover { background: #ef4444; color: white; }

        .badge-count {
            background: var(--neon-blue);
            color: white;
            padding: 6px 15px;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 800;
            box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3);
        }

        @media (max-width: 992px) {
            .sidebar { width: 85px; }
            .sidebar span, .brand-logo { display: none; }
            .main-content { margin-left: 85px; padding: 30px; }
        }
    </style>
</head>
<body>

<div class="d-flex">
    <nav class="sidebar">
        <a href="#" class="brand-logo">Vendor<span>Hub.</span></a>
        <div class="nav flex-column">
            <a href="#" class="nav-link active-link" onclick="switchView('requests', this)">
                <i class="fas fa-bolt"></i> <span>Incoming Jobs</span>
            </a>
            <a href="#" class="nav-link" onclick="switchView('services', this)">
                <i class="fas fa-briefcase"></i> <span>My Services</span>
            </a>
            <a href="#" class="nav-link">
                <i class="fas fa-star"></i> <span>My Ratings</span>
            </a>
            <div style="position: absolute; bottom: 40px; width: calc(100% - 40px);">
                <hr class="opacity-10">
                <a onclick="logout()" class="nav-link text-danger" style="cursor: pointer;">
                    <i class="fas fa-power-off"></i> <span>Logout</span>
                </a>
            </div>
        </div>
    </nav>

    <main class="main-content flex-grow-1">

        <div id="sectionDashboard">
            <header class="page-header d-flex justify-content-between align-items-end">
                <div>
                    <h2>Service <span style="color: var(--neon-blue)">Terminal.</span></h2>
                    <p>New event requests assigned to your service profile.</p>
                </div>
                <div class="mb-2">
                    <span class="badge-count" id="reqCount">0 NEW TASKS</span>
                </div>
            </header>

            <div class="glass-container shadow-lg">
                <div class="table-responsive">
                    <table class="table align-middle">
                        <thead>
                        <tr>
                            <th>REF ID</th>
                            <th>CATEGORY</th>
                            <th>PLANNED DATE</th>
                            <th class="text-center">TERMINAL ACTION</th>
                        </tr>
                        </thead>
                        <tbody id="vendorRequestsBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="sectionServices" style="display: none;">
            <header class="page-header">
                <h2>Manage <span style="color: var(--neon-purple)">Services.</span></h2>
                <p>Update your business portfolio and pricing.</p>
            </header>
            <div class="glass-container text-center py-5">
                <i class="fas fa-tools fa-3x text-muted mb-3"></i>
                <h5 class="text-dim">Your service portfolio management is coming soon.</h5>
            </div>
        </div>

    </main>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    function switchView(view, el) {
        $('.nav-link').removeClass('active-link');
        $(el).addClass('active-link');
        if(view === 'requests') {
            $('#sectionDashboard').fadeIn();
            $('#sectionServices').hide();
        } else {
            $('#sectionDashboard').hide();
            $('#sectionServices').fadeIn();
        }
    }

    function logout() {
        if(confirm("Securely sign out?")) {
            localStorage.clear();
            window.location.href = 'login.html';
        }
    }
</script>
<script src="js/vendor.js"></script>
</body>
</html>
