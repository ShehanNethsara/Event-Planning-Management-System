<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Dashboard | EventPro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

<div class="d-flex">
    <nav class="sidebar bg-dark text-white p-4 vh-100 position-fixed" style="width: 260px;">
        <div class="mb-5 text-center">
            <h3 class="fw-bold text-primary">VENDOR<span class="text-white">HUB</span></h3>
        </div>
        <ul class="nav flex-column gap-2">
            <li class="nav-item">
                <a href="#" id="navDashboard" class="nav-link text-white active-link bg-primary rounded shadow-sm">
                    <i class="fas fa-chart-line me-2"></i> Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a href="#" id="navServices" class="nav-link text-white-50">
                    <i class="fas fa-concierge-bell me-2"></i> My Services
                </a>
            </li>
            <li class="nav-item mt-5">
                <a href="#" onclick="logout()" class="nav-link text-danger">
                    <i class="fas fa-sign-out-alt me-2"></i> Logout
                </a>
            </li>
        </ul>
    </nav>

    <main class="flex-grow-1 p-5" style="margin-left: 260px;">

        <div id="sectionDashboard">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold text-dark">Service Requests</h2>
                <span class="badge bg-primary rounded-pill px-3 py-2" id="reqCount">2 New</span>
            </div>

            <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                <div class="card-header bg-white p-4 border-0">
                    <h5 class="fw-bold mb-0 text-muted">Incoming Requests (From Admin)</h5>
                </div>
                <div class="table-responsive px-4 pb-4">
                    <table class="table table-hover align-middle">
                        <thead class="bg-light text-muted small">
                        <tr>
                            <th>ID</th>
                            <th>EVENT TYPE</th>
                            <th>PLANNED DATE</th>
                            <th>SERVICE NEEDED</th>
                            <th>STATUS</th>
                            <th class="text-center">ACTION</th>
                        </tr>
                        </thead>
                        <tbody id="vendorRequestsBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="sectionServices" style="display: none;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold text-dark">My Registered Services</h2>
                <button class="btn btn-primary rounded-pill px-4 shadow-sm" data-bs-toggle="modal" data-bs-target="#addServiceModal">
                    <i class="fas fa-plus me-2"></i> Register Service
                </button>
            </div>

            <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                <div class="table-responsive p-4">
                    <table class="table align-middle">
                        <thead class="text-muted small">
                        <tr>
                            <th>SERVICE CATEGORY</th>
                            <th>PRICE RANGE (LKR)</th>
                            <th>EXPERIENCE</th>
                            <th>STATUS</th>
                        </tr>
                        </thead>
                        <tbody id="myServicesList">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

    </main>
</div>

<div class="modal fade" id="addServiceModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content border-0 rounded-4 shadow-lg p-3">
            <div class="modal-header border-0 pb-0">
                <h5 class="fw-bold">Register Your Service</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="vendorServiceForm">
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Service Category</label>
                        <select class="form-select border-0 bg-light" id="serviceCat" required>
                            <option value="Food">Food / Catering</option>
                            <option value="Music">Music / DJ</option>
                            <option value="Photography">Photography</option>
                            <option value="Decoration">Decoration</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Starting Price Range (LKR)</label>
                        <input type="text" class="form-control border-0 bg-light" id="servicePrice" placeholder="e.g. 50,000 - 100,000" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-3 rounded-pill fw-bold mt-3 shadow-sm">Submit Service</button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/vendor.js"></script>
</body>
</html>
