<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - EventPro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand fw-bold" href="#">EVENTPRO</a>
        <div class="d-flex">
            <span id="userDisplayName" class="navbar-text me-3 text-white"></span>
            <button onclick="logout()" class="btn btn-sm btn-danger">Logout</button>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="row">
        <div class="col-md-3">
            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <h5 class="card-title">Quick Stats</h5>
                    <hr>
                    <p>Total Events: <span class="fw-bold" id="totalEvents">0</span></p>
                    <p>Pending: <span class="badge bg-warning text-dark" id="pendingCount">0</span></p>
                </div>
            </div>
            <button class="btn btn-primary w-100 mb-3" data-bs-toggle="modal" data-bs-target="#addEventModal">
                <i class="bi bi-plus-circle"></i> Create New Event
            </button>
        </div>

        <div class="col-md-9">
            <div class="card shadow-sm">
                <div class="card-header bg-white">
                    <h4 class="mb-0">My Events</h4>
                </div>
                <div class="card-body">
                    <table class="table table-hover">
                        <thead class="table-light">
                        <tr>
                            <th>Event Title</th>
                            <th>Date</th>
                            <th>Type</th>
                            <th>Status</th>
                            <th>Action</th>
                        </tr>
                        </thead>
                        <tbody id="eventTableBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/dashboard.js"></script>
</body>
</html>
