<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Dashboard | EventPro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .nav-link { cursor: pointer; transition: 0.3s; }
        .active-link { background: #0d6efd !important; color: white !important; font-weight: 600; }
        .sidebar { z-index: 1000; transition: all 0.3s; }
    </style>
</head>
<body class="bg-light">

<div class="d-flex">
    <nav class="sidebar bg-dark text-white p-4 vh-100 position-fixed" style="width: 260px;">
        <div class="mb-5 text-center">
            <h3 class="fw-bold text-primary">VENDOR<span class="text-white">HUB</span></h3>
        </div>
        <ul class="nav flex-column gap-2" id="vendorNavbar">
            <li class="nav-item">
                <a class="nav-link text-white active-link rounded p-3" id="linkDashboard">
                    <i class="fas fa-chart-line me-2"></i> Vendor Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a class="nav-link text-white-50 rounded p-3" id="linkServices">
                    <i class="fas fa-concierge-bell me-2"></i> My Services
                </a>
            </li>
            <li class="nav-item mt-5">
                <a onclick="logout()" class="nav-link text-danger p-3">
                    <i class="fas fa-sign-out-alt me-2"></i> Logout
                </a>
            </li>
        </ul>
    </nav>

    <main class="flex-grow-1 p-5" style="margin-left: 260px;">

        <div id="sectionDashboard">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="fw-bold text-dark">Service Requests</h2>
                    <p class="text-muted small">Manage and respond to event bookings assigned by Admin.</p>
                </div>
                <span class="badge bg-primary rounded-pill px-3 py-2" id="reqCount">0 New</span>
            </div>

            <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
                <div class="table-responsive px-4 py-4">
                    <table class="table table-hover align-middle">
                        <thead class="bg-light text-muted small">
                        <tr>
                            <th>EVENT ID</th>
                            <th>EVENT TYPE</th>
                            <th>PLANNED DATE</th>
                            <th class="text-center">ACTION</th>
                        </tr>
                        </thead>
                        <tbody id="vendorRequestsBody">
                        </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div id="sectionServices" style="display: none;">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h2 class="fw-bold text-dark">My Services</h2>
            </div>
            <div class="card border-0 shadow-sm rounded-4 p-5 text-center">
                <i class="fas fa-tools fs-1 text-muted mb-3"></i>
                <h5 class="text-muted">Registered services will appear here.</h5>
            </div>
        </div>

    </main>
</div>

<!--<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>-->
<!--<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>-->
<!--<script src="js/vendor.js"></script>-->
</body>
</html>
