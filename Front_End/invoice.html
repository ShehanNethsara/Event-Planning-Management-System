<!DOCTYPE html>
<html lang="en">
    <head>
    <meta charset="UTF-8">
    <title>Invoice - EventPro</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .invoice-box { padding: 30px; border: 1px solid #eee; box-shadow: 0 0 10px rgba(0, 0, 0, 0.15); font-size: 16px; line-height: 24px; color: #555; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>
<div class="container my-5 invoice-box bg-white">
    <div class="d-flex justify-content-between">
        <div>
            <h2 class="fw-bold text-primary">EVENTPRO</h2>
            <p>Wadduwa, Sri Lanka<br>contact@eventpro.lk</p>
        </div>
        <div class="text-end">
            <h4>INVOICE</h4>
            <p>Date: <span id="invDate"></span><br>Invoice #: <span id="invNum"></span></p>
        </div>
    </div>
    <hr>
        <table class="table">
            <thead>
            <tr><th>Description</th><th class="text-end">Amount</th></tr>
            </thead>
            <tbody id="invoiceItems">
            </tbody>
        </table>
        <div class="text-end">
            <h5>Total: <span id="invTotal" class="fw-bold"></span></h5>
        </div>
        <div class="mt-5 no-print">
            <button onclick="window.print()" class="btn btn-dark">Download PDF / Print</button>
        </div>
</div>
</body>
</html>
