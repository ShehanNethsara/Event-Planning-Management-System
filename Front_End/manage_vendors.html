<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vendor Management - EventPro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
  <div class="container">
    <a class="navbar-brand fw-bold" href="dashboard.html">EVENTPRO</a>
  </div>
</nav>

<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h3><i class="fas fa-truck-loading me-2 text-primary"></i> Service Vendors</h3>
    <button class="btn btn-primary" data-bs-toggle="modal" data-bs-target="#addVendorModal">
      <i class="fas fa-plus me-1"></i> Register Vendor
    </button>
  </div>

  <div class="card p-3 mb-4 border-0 shadow-sm">
    <div class="row">
      <div class="col-md-4">
        <select id="filterType" class="form-select" onchange="filterVendors()">
          <option value="ALL">All Categories</option>
          <option value="CATERING">Catering</option>
          <option value="PHOTOGRAPHY">Photography</option>
          <option value="DECORATION">Decoration</option>
        </select>
      </div>
    </div>
  </div>

  <div class="row" id="vendorContainer">
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/vendor.js"></script>
</body>
</html>
