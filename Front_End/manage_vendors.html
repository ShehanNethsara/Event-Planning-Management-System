<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendor Management - EventPro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
  <style>
    .vendor-card { transition: transform 0.3s ease; border-radius: 15px; }
    .vendor-card:hover { transform: translateY(-5px); }
    .badge-cat { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; }
  </style>
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark py-3">
  <div class="container">
    <a class="navbar-brand fw-bold text-primary" href="adminDashboard.html">EVENT<span class="text-white">PRO</span></a>
    <div class="d-flex align-items-center">
      <span class="text-white-50 me-3 small" id="adminEmail">admin@eventpro.com</span>
      <a href="adminDashboard.html" class="btn btn-outline-light btn-sm rounded-pill px-3">Back to Panel</a>
    </div>
  </div>
</nav>

<div class="container mt-5">
  <div class="d-flex justify-content-between align-items-center mb-4">
    <div>
      <h3 class="fw-bold mb-0"><i class="fas fa-truck-loading me-2 text-primary"></i> Service Vendors</h3>
      <p class="text-muted small">Manage and assign professional vendors to events.</p>
    </div>
    <button class="btn btn-primary rounded-pill px-4 shadow-sm" data-bs-toggle="modal" data-bs-target="#addVendorModal">
      <i class="fas fa-plus me-1"></i> Register Vendor
    </button>
  </div>

  <div class="card p-3 mb-4 border-0 shadow-sm rounded-4">
    <div class="row align-items-center">
      <div class="col-md-4">
        <label class="form-label small fw-bold text-muted">Filter by Category</label>
        <select id="filterType" class="form-select border-0 bg-light rounded-3" onchange="filterVendors()">
          <option value="ALL">All Categories</option>
          <option value="CATERING">Catering / Food</option>
          <option value="PHOTOGRAPHY">Photography</option>
          <option value="MUSIC">Music / DJ</option>
          <option value="DECORATION">Decoration</option>
        </select>
      </div>
      <div class="col-md-8 text-end">
        <span class="badge bg-primary rounded-pill px-3" id="vendorCount">Total: 0</span>
      </div>
    </div>
  </div>

  <div class="row g-4" id="vendorContainer">
    <div class="text-center py-5 text-muted">
      <div class="spinner-border text-primary mb-2"></div>
      <p>Loading Vendors...</p>
    </div>
  </div>
</div>

<div class="modal fade" id="addVendorModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content border-0 rounded-4 shadow">
      <div class="modal-header border-0 pb-0">
        <h5 class="fw-bold mt-2">Register New Vendor</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4">
        <form id="vendorRegForm">
          <div class="mb-3">
            <label class="form-label small fw-bold">Business Name</label>
            <input type="text" id="vName" class="form-control" placeholder="e.g. Royal Catering" required>
          </div>
          <div class="row">
            <div class="col-6 mb-3">
              <label class="form-label small fw-bold">Category</label>
              <select id="vCat" class="form-select" required>
                <option value="CATERING">Catering</option>
                <option value="PHOTOGRAPHY">Photography</option>
                <option value="MUSIC">Music</option>
                <option value="DECORATION">Decoration</option>
              </select>
            </div>
            <div class="col-6 mb-3">
              <label class="form-label small fw-bold">Contact Number</label>
              <input type="text" id="vPhone" class="form-control" placeholder="07x xxxxxxx" required>
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold">Pricing Starting From (LKR)</label>
            <input type="number" id="vPrice" class="form-control" placeholder="50000" required>
          </div>
          <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-bold mt-3">Register Now</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/vendor.js"></script>
</body>
</html>
