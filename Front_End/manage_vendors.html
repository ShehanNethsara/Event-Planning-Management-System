<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendor Directory | EventPro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    body {
      /* අකුරු පැහැදිලිව පේන්න Standard Sans-Serif පාවිච්චි කළා */
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #0a0f1c; /* Deep Dark Blue */
      color: #ffffff;
      margin: 0;
      min-height: 100vh;
    }

    /* --- Navbar --- */
    .modern-nav {
      background: #111827;
      border-bottom: 2px solid #1f2937;
      padding: 15px 0;
    }

    .navbar-brand {
      font-weight: 800;
      font-size: 1.6rem;
      color: #6366f1 !important; /* Indigo Color */
      text-decoration: none;
    }

    /* --- Page Headers --- */
    .page-title {
      font-weight: 800;
      font-size: 2.5rem;
      color: #ffffff;
      margin-bottom: 10px;
    }

    .text-indigo { color: #818cf8; }
    .text-dim { color: #9ca3af; font-size: 0.95rem; }

    /* --- Glass Cards (Contrast එක වැඩි කළා) --- */
    .glass-card {
      background: rgba(31, 41, 55, 0.7); /* ටිකක් තද පාටක් දුන්නා අකුරු පේන්න */
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px;
      padding: 25px;
      margin-bottom: 30px;
    }

    /* --- Form Elements --- */
    .form-label {
      color: #e5e7eb;
      font-weight: 600;
      font-size: 0.85rem;
      margin-bottom: 8px;
      display: block;
    }

    .form-select, .form-control {
      background-color: #1f2937 !important;
      border: 1px solid #374151 !important;
      color: #ffffff !important; /* අකුරු සුදු පාට කළා */
      border-radius: 10px !important;
      padding: 12px !important;
    }

    /* --- Buttons --- */
    .btn-primary-modern {
      background: linear-gradient(90deg, #4f46e5, #7c3aed);
      border: none;
      color: white;
      padding: 12px 25px;
      border-radius: 50px;
      font-weight: 700;
      transition: 0.3s;
    }

    .btn-primary-modern:hover {
      transform: scale(1.03);
      box-shadow: 0 10px 20px rgba(79, 70, 229, 0.4);
    }

    /* --- Vendor Card Styles --- */
    .vendor-item-card {
      background: #1f2937;
      border-radius: 18px;
      padding: 20px;
      border: 1px solid #374151;
      transition: 0.3s;
    }

    .vendor-item-card:hover {
      border-color: #6366f1;
    }

    .badge-cat {
      background: rgba(99, 102, 241, 0.2);
      color: #a5b4fc;
      padding: 5px 12px;
      border-radius: 50px;
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    /* --- Modal --- */
    .modal-content {
      background-color: #111827;
      color: white;
      border-radius: 20px;
      border: 1px solid #374151;
    }

    .modal-header { border-bottom: 1px solid #1f2937; }

  </style>
</head>
<body>

<nav class="navbar modern-nav sticky-top">
  <div class="container">
    <a class="navbar-brand" href="adminDashboard.html">EVENTPRO</a>
    <div class="ms-auto d-flex align-items-center">
      <span class="text-dim me-3 d-none d-md-block">Admin Terminal</span>
      <a href="adminDashboard.html" class="btn btn-outline-light btn-sm rounded-pill px-4">Back</a>
    </div>
  </div>
</nav>

<div class="container mt-5">
  <div class="row align-items-center mb-5">
    <div class="col-md-8">
      <h1 class="page-title">Vendor <span class="text-indigo">Network</span></h1>
      <p class="text-dim">Manage your professional service providers and their pricing.</p>
    </div>
    <div class="col-md-4 text-md-end">
      <button class="btn btn-primary-modern" data-bs-toggle="modal" data-bs-target="#addVendorModal">
        <i class="fas fa-plus-circle me-2"></i> Register Vendor
      </button>
    </div>
  </div>

  <div class="glass-card">
    <div class="row align-items-center">
      <div class="col-md-4">
        <label class="form-label">FILTER BY SERVICE</label>
        <select id="filterType" class="form-select" onchange="filterVendors()">
          <option value="ALL">Show All Categories</option>
          <option value="CATERING">🍴 Catering Services</option>
          <option value="PHOTOGRAPHY">📷 Photography</option>
          <option value="MUSIC">🎵 Music & Entertainment</option>
          <option value="DECORATION">🎨 Event Decoration</option>
        </select>
      </div>
      <div class="col-md-8 text-end">
        <div class="d-inline-block p-2 px-4 rounded-pill bg-dark border border-secondary">
          <small class="text-dim fw-bold me-2">TOTAL ACTIVE:</small>
          <span class="fw-bold" id="vendorCount" style="color: #6366f1;">0</span>
        </div>
      </div>
    </div>
  </div>

  <div class="row g-4" id="vendorContainer">
    <div class="col-12 text-center py-5">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="mt-3 text-dim">Fetching verified vendors...</p>
    </div>
  </div>
</div>

<div class="modal fade" id="addVendorModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content shadow-lg">
      <div class="modal-header">
        <h5 class="fw-bold m-0">Register New Partner</h5>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body p-4">
        <form id="vendorRegForm">
          <div class="mb-3">
            <label class="form-label">BUSINESS NAME</label>
            <input type="text" id="vName" class="form-control" placeholder="Ex: Royal Catering" required>
          </div>
          <div class="row mb-3">
            <div class="col-6">
              <label class="form-label">CATEGORY</label>
              <select id="vCat" class="form-select" required>
                <option value="CATERING">Catering</option>
                <option value="PHOTOGRAPHY">Photography</option>
                <option value="MUSIC">Music</option>
                <option value="DECORATION">Decoration</option>
              </select>
            </div>
            <div class="col-6">
              <label class="form-label">CONTACT NO</label>
              <input type="text" id="vPhone" class="form-control" placeholder="07x xxxxxxx" required>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label">STARTING PRICE (LKR)</label>
            <input type="number" id="vPrice" class="form-control" placeholder="50000" required>
          </div>
          <button type="submit" class="btn btn-primary-modern w-100">Confirm Registration</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/vendor.js"></script>
</body>
</html>
