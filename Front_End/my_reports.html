<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reports | EventPro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">

<div class="d-flex">
    <nav class="sidebar bg-dark text-white p-4 vh-100 position-fixed" style="width: 260px;">
        <div class="mb-5 text-center">
            <h3 class="fw-bold text-primary">EVENT<span class="text-white">PRO</span></h3>
        </div>
        <ul class="nav flex-column gap-2">
            <li class="nav-item">
                <a href="user_dashboard.html" class="nav-link text-white-50">
                    <i class="fas fa-home me-2"></i> Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a href="my_reports.html" class="nav-link text-white active-link bg-primary rounded shadow-sm">
                    <i class="fas fa-file-invoice-dollar me-2"></i> My Invoices
                </a>
            </li>
            <li class="nav-item mt-5">
                <button onclick="logout()" class="btn btn-outline-danger w-100 border-0 text-start">
                    <i class="fas fa-sign-out-alt me-2"></i> Logout
                </button>
            </li>
        </ul>
    </nav>

    <main class="flex-grow-1 p-5" style="margin-left: 260px;">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h2 class="fw-bold text-dark">Financial Reports</h2>
                <p class="text-muted">View and download your approved event invoices.</p>
            </div>
        </div>

        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="card-header bg-white p-4 border-0">
                <h5 class="fw-bold mb-0">Approved Invoices</h5>
            </div>
            <div class="table-responsive px-4 pb-4">
                <table class="table align-middle table-hover">
                    <thead class="text-muted small text-uppercase">
                    <tr>
                        <th>Invoice ID</th>
                        <th>Event Title</th>
                        <th>Event Date</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th class="text-center">Action</th>
                    </tr>
                    </thead>
                    <tbody id="invoiceTableBody">
                    <tr><td colspan="6" class="text-center py-5"><div class="spinner-border text-primary"></div></td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    // --- මෙතන ඉඳන් තමයි JS එක පටන් ගන්නේ ---
    $(document).ready(function() {
        loadMyInvoices();
    });

    function loadMyInvoices() {
        const token = localStorage.getItem('token');
        const email = localStorage.getItem('userEmail');

        if (!token) {
            window.location.href = 'login.html';
            return;
        }

        $.ajax({
            url: `http://localhost:8080/api/v1/events/my-events?email=${email}`,
            method: "GET",
            headers: { "Authorization": "Bearer " + token },
            success: function(data) {
                let rows = "";
                // APPROVED හෝ COMPLETED ඒවා විතරක් පෙන්නමු
                const approvedEvents = data.filter(ev => ev.status === "APPROVED" || ev.status === "COMPLETED");

                if (approvedEvents.length === 0) {
                    rows = `<tr><td colspan="6" class="text-center py-4 text-muted">No approved invoices found yet.</td></tr>`;
                } else {
                    approvedEvents.forEach(ev => {
                        rows += `
                            <tr>
                                <td class="fw-bold text-primary">#INV-2026-${ev.id}</td>
                                <td><div class="fw-bold text-dark">${ev.title}</div></td>
                                <td><i class="far fa-calendar-alt me-2 text-muted"></i>${ev.date}</td>
                                <td class="fw-bold text-dark">$1,500.00</td>
                                <td><span class="badge bg-success bg-opacity-10 text-success rounded-pill px-3">${ev.status}</span></td>
                                <td class="text-center">
                                    <a href="invoice.html?id=${ev.id}" class="btn btn-sm btn-primary rounded-pill px-3">
                                        <i class="fas fa-file-pdf me-1"></i> View PDF
                                    </a>
                                </td>
                            </tr>`;
                    });
                }
                $('#invoiceTableBody').hide().html(rows).fadeIn(400);
            },
            error: function() {
                $('#invoiceTableBody').html('<tr><td colspan="6" class="text-center text-danger">Failed to load reports.</td></tr>');
            }
        });
    }

    function logout() {
        if(confirm("Logout from EventPro?")) {
            localStorage.clear();
            window.location.href = 'login.html';
        }
    }
</script>
</body>
</html>
