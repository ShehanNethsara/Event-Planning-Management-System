<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Reports | EventPro</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
    <style>
        body { font-family: 'Poppins', sans-serif; }
        .sidebar { min-height: 100vh; z-index: 1000; }
        .active-link { background: #0d6efd !important; color: white !important; }
        .card { border-radius: 15px; }
        .badge { font-weight: 500; }
    </style>
</head>
<body class="bg-light">

<div class="d-flex">
    <nav class="sidebar bg-dark text-white p-4 vh-100 position-fixed" style="width: 260px;">
        <div class="mb-5 text-center">
            <h3 class="fw-bold text-primary">EVENT<span class="text-white">PRO</span></h3>
        </div>
        <ul class="nav flex-column gap-2">
            <li class="nav-item">
                <a href="user_dashboard.html" class="nav-link text-white-50">
                    <i class="fas fa-home me-2"></i> Dashboard
                </a>
            </li>
            <li class="nav-item">
                <a href="my_reports.html" class="nav-link text-white active-link rounded shadow-sm">
                    <i class="fas fa-file-invoice-dollar me-2"></i> My Invoices
                </a>
            </li>
            <li class="nav-item mt-5">
                <button onclick="logout()" class="btn btn-outline-danger w-100 border-0 text-start">
                    <i class="fas fa-sign-out-alt me-2"></i> Logout
                </button>
            </li>
        </ul>
    </nav>

    <main class="flex-grow-1 p-5" style="margin-left: 260px;">
        <div class="d-flex justify-content-between align-items-center mb-5">
            <div>
                <h2 class="fw-bold text-dark">Financial Reports</h2>
                <p class="text-muted">View and download your event invoices and track payments.</p>
            </div>
        </div>

        <div class="card border-0 shadow-sm overflow-hidden">
            <div class="card-header bg-white p-4 border-0">
                <h5 class="fw-bold mb-0">Invoice History</h5>
            </div>
            <div class="table-responsive px-4 pb-4">
                <table class="table align-middle table-hover">
                    <thead class="text-muted small text-uppercase">
                    <tr>
                        <th>Invoice ID</th>
                        <th>Event Title</th>
                        <th>Issued Date</th>
                        <th>Amount</th>
                        <th>Status</th>
                        <th class="text-center">Action</th>
                    </tr>
                    </thead>
                    <tbody id="invoiceTableBody">
                    <tr>
                        <td colspan="6" class="text-center py-5">
                            <div class="spinner-border text-primary"></div>
                            <p class="mt-2">Loading your invoices...</p>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    $(document).ready(function() {
        console.log("Page Loaded. Checking LocalStorage...");
        console.log("Token:", localStorage.getItem('token'));
        console.log("Email:", localStorage.getItem('userEmail'));

        loadMyInvoices();
    });

    function loadMyInvoices() {
        const token = localStorage.getItem('token');
        const email = localStorage.getItem('userEmail');

        if (!token || !email) {
            console.error("Missing token or email! Redirecting to login...");
            window.location.href = 'login.html';
            return;
        }

        $.ajax({
            url: `http://localhost:8080/api/v1/invoices/my-invoices?email=${email}`,
            method: "GET",
            headers: { "Authorization": "Bearer " + token },
            success: function(invoices) {
                console.log("Data successfully fetched from Backend:", invoices);

                let rows = "";

                if (!invoices || invoices.length === 0) {
                    console.warn("Backend returned an empty list for email:", email);
                    rows = `<tr><td colspan="6" class="text-center py-5 text-muted">No invoices found for your account.</td></tr>`;
                } else {
                    invoices.forEach(inv => {
                        // Backend එකෙන් එන field names හරියටම check කරමු
                        const id = inv.id;
                        const title = inv.eventTitle || 'No Title';
                        const date = inv.issuedDate || 'No Date';
                        const amount = inv.amount || 0;
                        const status = inv.status || 'UNKNOWN';

                        const statusBadge = status === 'PAID'
                            ? 'bg-success text-success'
                            : 'bg-warning text-warning';

                        rows += `
                            <tr>
                                <td class="fw-bold text-primary">#INV-${id}</td>
                                <td><div class="fw-bold text-dark">${title}</div></td>
                                <td><i class="far fa-calendar-alt me-2 text-muted"></i>${date}</td>
                                <td class="fw-bold text-dark">LKR ${amount.toLocaleString()}</td>
                                <td><span class="badge ${statusBadge} bg-opacity-10 rounded-pill px-3">${status}</span></td>
                                <td class="text-center">
                                    <div class="btn-group">
                                        <a href="invoice_view.html?id=${id}" class="btn btn-sm btn-outline-primary rounded-pill px-3 me-2">
                                            <i class="fas fa-eye me-1"></i> View
                                        </a>
                                        ${status === 'UNPAID' ? `
                                            <button onclick="payNow(${id}, ${amount})" class="btn btn-sm btn-success rounded-pill px-3">
                                                <i class="fas fa-credit-card me-1"></i> Pay
                                            </button>` : ''}
                                    </div>
                                </td>
                            </tr>`;
                    });
                }
                $('#invoiceTableBody').hide().html(rows).fadeIn(400);
            },
            error: function(err) {
                console.error("AJAX Error:", err);
                $('#invoiceTableBody').html('<tr><td colspan="6" class="text-center text-danger py-4">Error connecting to server. Check Console (F12).</td></tr>');
            }
        });
    }

    function payNow(invoiceId, amount) {
        localStorage.setItem('payingInvoiceId', invoiceId);
        localStorage.setItem('payingAmount', amount);
        window.location.href = 'payment.html';
    }

    function logout() {
        if(confirm("Are you sure?")) {
            localStorage.clear();
            window.location.href = 'login.html';
        }
    }
</script>
</body>
</html>
