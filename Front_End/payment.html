<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Secure Checkout - EventPro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light">
<div class="container py-5">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card shadow-lg border-0">
        <div class="card-body p-5">
          <h4 class="fw-bold mb-4"><i class="fas fa-lock me-2 text-success"></i>Secure Payment</h4>
          <div id="paymentSummary" class="alert alert-info mb-4">
          </div>
          <form id="paymentForm">
            <div class="mb-3">
              <label class="form-label">Card Holder Name</label>
              <input type="text" class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Card Number</label>
              <div class="input-group">
                <span class="input-group-text"><i class="fas fa-credit-card"></i></span>
                <input type="text" class="form-control" placeholder="0000 0000 0000 0000" required>
              </div>
            </div>
            <div class="row">
              <div class="col-6 mb-3">
                <label class="form-label">Expiry</label>
                <input type="text" class="form-control" placeholder="MM/YY" required>
              </div>
              <div class="col-6 mb-3">
                <label class="form-label">CVV</label>
                <input type="password" class="form-control" placeholder="***" required>
              </div>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold">Pay Now</button>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/payment.js"></script>
</body>
</html>
