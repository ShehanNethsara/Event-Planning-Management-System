<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Secure Payment | EventPro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="bg-light d-flex align-items-center vh-100">

<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-5">
      <div class="card border-0 shadow-lg rounded-4 p-5 bg-white">
        <div class="text-center mb-4">
          <div class="bg-primary bg-opacity-10 d-inline-block p-3 rounded-circle mb-3">
            <i class="fas fa-shield-alt text-primary fa-2x"></i>
          </div>
          <h3 class="fw-bold">Secure Payment</h3>
          <p class="text-muted">Enter your card details to complete booking</p>
        </div>

        <form id="paymentForm">
          <div class="mb-3">
            <label class="form-label small fw-bold text-muted">CARDHOLDER NAME</label>
            <input type="text" class="form-control p-3 bg-light border-0" placeholder="J. DOE" required>
          </div>
          <div class="mb-3">
            <label class="form-label small fw-bold text-muted">CARD NUMBER</label>
            <div class="input-group">
              <span class="input-group-text bg-light border-0"><i class="fas fa-credit-card"></i></span>
              <input type="text" class="form-control p-3 bg-light border-0" placeholder="0000 0000 0000 0000" required>
            </div>
          </div>
          <div class="row">
            <div class="col-6 mb-3">
              <label class="form-label small fw-bold text-muted">EXPIRY</label>
              <input type="text" class="form-control p-3 bg-light border-0" placeholder="MM/YY" required>
            </div>
            <div class="col-6 mb-3">
              <label class="form-label small fw-bold text-muted">CVV</label>
              <input type="password" class="form-control p-3 bg-light border-0" placeholder="***" required>
            </div>
          </div>

          <div class="bg-primary text-white p-3 rounded-3 mb-4 d-flex justify-content-between align-items-center">
            <span>Amount to Pay:</span>
            <h4 class="mb-0 fw-bold" id="totalAmountDisplay">LKR 0.00</h4>          </div>

          <button type="submit" class="btn btn-primary btn-lg w-100 rounded-pill shadow p-3 fw-bold">
            <i class="fas fa-lock me-2"></i>Confirm & Pay Now
          </button>
          <a href="user_dashboard.html" class="btn btn-link w-100 text-muted mt-2 text-decoration-none small">Cancel & Return</a>
        </form>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
  $('#paymentForm').submit(function(e) {
    e.preventDefault();
    alert("Payment Successful! Your event is now confirmed.");
    window.location.href = 'user_dashboard.html';
  });
</script>
</body>
</html>
