<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>User Dashboard - EventPro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="css/dashboard-pro.css">
</head>
<body>
<div class="d-flex">
  <nav class="bg-dark text-white p-3 vh-100 shadow" style="width: 250px;">
    <h4 class="text-center fw-bold text-primary mb-4">EVENTPRO</h4>
    <ul class="nav flex-column">
      <li class="nav-item mb-2"><a href="user_dashboard.html" class="nav-link text-white active"><i class="fa fa-home me-2"></i>Dashboard</a></li>
      <li class="nav-item mb-2"><a href="book_event.html" class="nav-link text-white"><i class="fa fa-plus-circle me-2"></i>Book Event</a></li>
      <li class="nav-item mb-2"><a href="my_reports.html" class="nav-link text-white"><i class="fa fa-file-invoice me-2"></i>My Invoices</a></li>
      <li class="nav-item mb-2"><a href="profile.html" class="nav-link text-white"><i class="fa fa-user me-2"></i>Profile</a></li>
      <hr>
      <li class="nav-item"><a href="#" onclick="logout()" class="nav-link text-danger"><i class="fa fa-sign-out-alt me-2"></i>Logout</a></li>
    </ul>
  </nav>

  <div class="flex-grow-1 p-4 bg-light">
    <div class="row mb-4">
      <div class="col-md-4">
        <div class="card bg-primary text-white p-3 border-0">
          <h6>Ongoing Events</h6>
          <h2 id="ongoingCount">0</h2>
        </div>
      </div>
      <div class="col-md-4">
        <div class="card bg-success text-white p-3 border-0">
          <h6>Completed Events</h6>
          <h2 id="completedCount">0</h2>
        </div>
      </div>
    </div>

    <div class="card shadow-sm">
      <div class="card-header bg-white fw-bold">Recent Bookings</div>
      <div class="card-body">
        <table class="table table-hover">
          <thead><tr><th>Event</th><th>Date</th><th>Status</th><th>Invoice</th></tr></thead>
          <tbody id="userEventBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/dashboard.js"></script>
</body>
</html>
