<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Dashboard | EventPro Elite</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    :root {
      --bg-deep: #050810;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-border: rgba(255, 255, 255, 0.08);
      --neon-blue: #6366f1;
      --neon-purple: #a855f7;
      --text-main: #ffffff;
      --text-dim: #94a3b8;
    }

    body {
      font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg-deep);
      background-image: radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.1) 0px, transparent 50%);
      color: var(--text-main);
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* --- Modern Sidebar with Blur --- */
    .sidebar {
      width: 280px;
      background: rgba(10, 15, 28, 0.8);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-right: 1px solid var(--glass-border);
      position: fixed;
      height: 100vh;
      padding: 35px 25px;
      z-index: 1000;
    }

    .brand-logo {
      font-size: 1.8rem;
      font-weight: 800;
      background: linear-gradient(to right, #6366f1, #a855f7);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 50px;
      display: block;
      text-decoration: none;
    }

    .nav-link {
      color: var(--text-dim) !important;
      padding: 14px 18px !important;
      border-radius: 12px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      font-weight: 500;
      transition: 0.3s;
    }

    .nav-link i { margin-right: 15px; font-size: 1.2rem; }

    .nav-link:hover, .active-link {
      background: rgba(99, 102, 241, 0.1);
      color: white !important;
      transform: translateX(5px);
    }

    .active-link {
      background: linear-gradient(90deg, rgba(99, 102, 241, 0.15), transparent) !important;
      border-left: 4px solid #6366f1;
    }

    /* --- Main Content --- */
    .main-content {
      margin-left: 280px;
      padding: 45px 60px;
    }

    .header-user {
      background: rgba(255, 255, 255, 0.03);
      padding: 10px 25px;
      border-radius: 50px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    /* --- Stat Cards (Neon Style) --- */
    .stat-card {
      background: var(--glass-bg);
      backdrop-filter: blur(10px);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      padding: 30px;
      transition: 0.3s;
    }

    .stat-card:hover {
      transform: translateY(-5px);
      border-color: #6366f1;
      background: rgba(255, 255, 255, 0.05);
    }

    .card-primary { border-left: 5px solid #6366f1; }
    .card-success { border-left: 5px solid #10b981; }
    .card-warning { border-left: 5px solid #f59e0b; }

    /* --- Dynamic Booking Cards Section --- */
    .booking-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 25px;
      margin-top: 30px;
    }

    .event-card {
      background: #111827;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid #1f2937;
      transition: 0.3s ease;
      position: relative;
    }

    .event-card:hover {
      transform: translateY(-10px) scale(1.02);
      border-color: #6366f1;
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .event-image {
      height: 180px;
      background-size: cover;
      background-position: center;
      position: relative;
    }

    .event-image::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; width: 100%; height: 50%;
      background: linear-gradient(to top, #111827, transparent);
    }

    .event-details {
      padding: 20px;
    }

    .event-details h5 { font-weight: 700; margin-bottom: 5px; }
    .event-details p { color: var(--text-dim); font-size: 0.85rem; margin-bottom: 15px; }

    .event-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.8rem;
      color: var(--text-dim);
    }

    .status-badge {
      padding: 5px 12px;
      border-radius: 50px;
      font-size: 0.7rem;
      font-weight: 800;
      text-transform: uppercase;
    }

    .status-confirmed { background: rgba(16, 185, 129, 0.1); color: #10b981; }
    .status-pending { background: rgba(245, 158, 11, 0.1); color: #f59e0b; }

    .btn-neon {
      background: linear-gradient(90deg, #6366f1, #a855f7);
      color: white; border: none; padding: 12px 28px; border-radius: 50px; font-weight: 700;
      box-shadow: 0 10px 20px rgba(99, 102, 241, 0.3); transition: 0.3s;
    }

    .btn-neon:hover { transform: scale(1.05); color: white; box-shadow: 0 15px 30px rgba(99, 102, 241, 0.5); }

    @media (max-width: 992px) {
      .sidebar { width: 85px; }
      .sidebar span, .brand-logo { display: none; }
      .main-content { margin-left: 85px; padding: 30px; }
    }
  </style>
</head>
<body>

<aside class="sidebar">
  <a href="#" class="brand-logo">EventPro<span>.</span></a>
  <nav class="nav flex-column">
    <a href="user_dashboard.html" class="nav-link active-link">
      <i class="fas fa-chart-pie"></i> <span>Dashboard</span>
    </a>
    <a href="book_event.html" class="nav-link">
      <i class="fas fa-calendar-plus"></i> <span>Book Event</span>
    </a>
    <a href="my_reports.html" class="nav-link">
      <i class="fas fa-file-invoice-dollar"></i> <span>My Invoices</span>
    </a>
    <a href="payment.html" class="nav-link">
      <i class="fas fa-credit-card"></i> <span>Payments</span>
    </a>
    <div style="position: absolute; bottom: 40px; width: calc(100% - 50px);">
      <hr class="opacity-10">
      <a href="#" onclick="logout()" class="nav-link text-danger">
        <i class="fas fa-power-off"></i> <span>Log Out</span>
      </a>
    </div>
  </nav>
</aside>

<main class="main-content">
  <header class="d-flex justify-content-between align-items-center mb-5">
    <div>
      <h1 class="fw-bold mb-1">Command <span style="color: #6366f1;">Center.</span></h1>
      <p class="text-secondary" id="currentDate">Wednesday, April 22, 2026</p>
    </div>
    <div class="header-user d-flex align-items-center gap-3">
      <div class="text-end d-none d-md-block">
        <small class="text-secondary d-block" style="font-size: 0.7rem;">CLIENT PORTAL</small>
        <span class="fw-bold" id="userEmailDisplay">User</span>
      </div>
      <img src="https://ui-avatars.com/api/?name=User&background=6366f1&color=fff" class="rounded-circle border border-2 border-primary" width="48">
    </div>
  </header>

  <div class="row g-4 mb-5">
    <div class="col-md-4">
      <div class="stat-card card-primary">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <p class="text-secondary small fw-bold mb-1">ONGOING EVENTS</p>
            <h2 class="fw-bold m-0" id="ongoingCount">0</h2>
          </div>
          <i class="fas fa-spinner fa-spin text-primary opacity-50 fs-3"></i>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="stat-card card-success">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <p class="text-secondary small fw-bold mb-1">COMPLETED</p>
            <h2 class="fw-bold m-0" id="completedCount">0</h2>
          </div>
          <i class="fas fa-check-circle text-success opacity-50 fs-3"></i>
        </div>
      </div>
    </div>
    <div class="col-md-4">
      <div class="stat-card card-warning">
        <div class="d-flex justify-content-between align-items-start">
          <div>
            <p class="text-secondary small fw-bold mb-1">TOTAL SPENDINGS</p>
            <h2 class="fw-bold m-0 text-white">LKR <span id="totalSpending">0.00</span></h2>
          </div>
          <i class="fas fa-wallet text-warning opacity-50 fs-3"></i>
        </div>
      </div>
    </div>
  </div>

  <div class="d-flex justify-content-between align-items-center mb-2">
    <h4 class="fw-bold m-0">My Event Portfolio</h4>
    <a href="book_event.html" class="btn btn-neon btn-sm">
      <i class="fas fa-plus me-2"></i> New Booking Request
    </a>
  </div>

  <div class="booking-grid" id="userEventBody">
    <div class="text-center py-5 col-12">
      <div class="spinner-border text-primary" role="status"></div>
      <p class="mt-3 text-secondary">Loading your event masterpieces...</p>
    </div>
  </div>

</main>
