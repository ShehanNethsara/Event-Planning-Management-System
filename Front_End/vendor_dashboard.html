<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Vendor Dashboard - EventPro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-light">
<nav class="navbar navbar-dark bg-primary shadow-sm py-3">
  <div class="container">
    <a class="navbar-brand fw-bold" href="#">Vendor <span class="text-warning">Portal</span></a>
    <button class="btn btn-light btn-sm rounded-pill" onclick="logout()">Logout</button>
  </div>
</nav>

<div class="container mt-5">
  <div class="card border-0 shadow-sm rounded-4">
    <div class="card-body p-4">
      <h4 class="fw-bold mb-4">Incoming Job Requests</h4>
      <div class="table-responsive">
        <table class="table align-middle">
          <thead class="table-light">
          <tr>
            <th>Event Type</th>
            <th>Planned Date</th>
            <th>Action</th>
          </tr>
          </thead>
          <tbody id="vendorTaskBody">
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/vendor_dashboard.js"></script>
</body>
</html>
