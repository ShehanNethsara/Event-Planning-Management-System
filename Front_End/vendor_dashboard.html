<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vendor Terminal | EventPro</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

  <style>
    /* --- ඇස් වලට පහසු High-Contrast Dark Theme --- */
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background-color: #050810; /* පට්ටම තද පසුබිම (Deep Black-Blue) */
      color: #ffffff; /* පිරිසිදු සුදු අකුරු */
      margin: 0;
      min-height: 100vh;
    }

    /* --- Sidebar Navigation --- */
    .sidebar {
      width: 280px;
      background: #0f172a; /* Sidebar එකටත් තද වර්ණයක් */
      border-right: 2px solid #1e293b;
      position: fixed;
      height: 100vh;
      padding: 40px 20px;
      z-index: 1000;
    }

    .brand-logo {
      font-size: 1.8rem;
      font-weight: 800;
      color: #6366f1 !important; /* Indigo Blue Logo */
      margin-bottom: 50px;
      display: block;
      text-decoration: none;
      letter-spacing: -1px;
    }

    .nav-link {
      color: #f8fafc !important; /* ලා අළු/සුදු අකුරු */
      padding: 14px 20px !important;
      border-radius: 12px;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      font-weight: 600;
      transition: 0.3s;
    }

    .nav-link:hover, .active-link {
      background: #1e293b;
      color: #6366f1 !important;
    }

    /* --- Main Content Section --- */
    .main-content {
      margin-left: 280px;
      padding: 60px;
    }

    .header-title {
      font-weight: 800;
      font-size: 2.5rem;
      margin-bottom: 10px;
      color: #ffffff;
    }

    .header-subtitle {
      color: #94a3b8; /* Dim text but still visible */
      margin-bottom: 40px;
    }

    /* --- Data Terminal Card --- */
    .terminal-card {
      background: #0f172a; /* තද පසුබිම */
      border: 1px solid #1e293b;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
    }

    /* --- Table Styling (අකුරු පේන්නම හදපු කොටස) --- */
    .table {
      color: #ffffff !important; /* Table එකේ හැම අකුරක්ම සුදු කළා */
      margin: 0;
    }

    .table thead th {
      background: #1e293b;
      color: #818cf8; /* ලා නිල් පාටින් Header එක */
      padding: 22px;
      font-weight: 700;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      border: none;
    }

    .table tbody td {
      padding: 22px;
      border-bottom: 1px solid #1e293b;
      color: #f1f5f9 !important; /* පැහැදිලි සුදු අකුරු */
      font-weight: 500;
      font-size: 0.95rem;
    }

    /* --- Action Button --- */
    .btn-accept {
      background: #10b981; /* Green */
      color: #ffffff;
      font-weight: 700;
      border: none;
      padding: 10px 25px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .btn-accept:hover {
      transform: scale(1.05);
      background: #059669;
    }

    @media (max-width: 992px) {
      .sidebar { width: 90px; padding: 30px 10px; }
      .sidebar span, .brand-logo { display: none; }
      .main-content { margin-left: 90px; padding: 30px; }
    }
  </style>
</head>
<body>

<aside class="sidebar">
  <a href="#" class="brand-logo">VENDOR<span>HUB</span></a>
  <nav class="nav flex-column">
    <a href="#" class="nav-link active-link">
      <i class="fas fa-terminal me-3"></i> <span>Job Terminal</span>
    </a>
    <a href="#" class="nav-link">
      <i class="fas fa-briefcase me-3"></i> <span>Services</span>
    </a>
    <hr style="border-color: #1e293b; opacity: 0.5;">
    <a onclick="logout()" class="nav-link text-danger" style="cursor: pointer;">
      <i class="fas fa-power-off me-3"></i> <span>Log Out</span>
    </a>
  </nav>
</aside>

<main class="main-content">
  <div class="header-section">
    <h1 class="header-title">Live Job <span style="color: #6366f1;">Terminal.</span></h1>
    <p class="header-subtitle">Accept and process your assigned event tasks in real-time.</p>
  </div>

  <div class="terminal-card">
    <div class="table-responsive">
      <table class="table align-middle">
        <thead>
        <tr>
          <th>Service Category</th>
          <th>Target Date</th>
          <th class="text-center">Terminal Control</th>
        </tr>
        </thead>
        <tbody id="vendorTaskBody">
        <tr>
          <td colspan="3" class="text-center py-5">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-3 text-secondary">Synchronizing Data...</p>
          </td>
        </tr>
        </tbody>
      </table>
    </div>
  </div>
</main>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="js/vendor_dashboard.js"></script>
<script>
  function logout() {
    if(confirm("Are you sure you want to exit the terminal?")) {
      localStorage.clear();
      window.location.href = 'login.html';
    }
  }
</script>
</body>
</html>
